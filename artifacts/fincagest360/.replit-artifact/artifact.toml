kind = "web"
previewPath = "/"
title = "FincaGest360"
version = "1.0.0"
id = "artifacts/fincagest360"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21604

[services.development]
run = "pnpm --filter @workspace/fincagest360 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fincagest360", "run", "build" ]
publicDir = "artifacts/fincagest360/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21604"
BASE_PATH = "/"
