name: Build APK - FincaGest 360

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar pnpm
        run: npm install -g pnpm

      - name: Instalar dependencias
        run: pnpm install

      # 🔥 BUILD SOLO FRONTEND (evita backend roto)
      - name: Build frontend
        run: pnpm --filter ./artifacts/fincagest360 run build

      # 🔥 INSTALAR CAPACITOR
      - name: Instalar Capacitor
        run: |
          pnpm add @capacitor/core @capacitor/cli @capacitor/android -w

      # 🔧 INIT CAPACITOR
      - name: Inicializar Capacitor
        run: |
          npx cap init "FincaGest 360" "com.fincagest.app" --web-dir=artifacts/fincagest360/dist

      # 🤖 ANDROID
      - name: Agregar Android
        run: npx cap add android

      - name: Sincronizar
        run: npx cap sync

      # ☕ JAVA
      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 🔨 BUILD APK
      - name: Compilar APK
        working-directory: android
        run: ./gradlew assembleDebug

      # 📦 RENOMBRAR APK
      - name: Preparar APK
        run: |
          APK=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          mv "$APK" FincaGest360.apk

      # 🚀 SUBIR APK
      - name: Crear Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: FincaGest 360 v1.0.${{ github.run_number }}
          files: FincaGest360.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
